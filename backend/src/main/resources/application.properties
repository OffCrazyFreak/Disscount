# Custom path for Swagger UI
springdoc.swagger-ui.path=/api-docs

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

##JPA Config
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Resource server: validate better-auth JWTs against its JWKS endpoint.
# In Docker, point this at the internal frontend URL (e.g. http://frontend:3000/api/auth/jwks).
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${BETTER_AUTH_JWKS_URI:http://localhost:3000/api/auth/jwks}
# better-auth signs with ES256 (configured in the jwt plugin)
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# Security
spring.security.require-ssl=false
