# Local dev overrides - activate with --spring.profiles.active=local
# These values are NOT defaults in application.properties so production startup
# fails explicitly if BETTER_AUTH_JWKS_URI / BETTER_AUTH_ISSUER are missing.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:3000/api/auth/jwks
better.auth.issuer=http://localhost:3000
