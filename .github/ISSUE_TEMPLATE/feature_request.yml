name: Feature request
description: Suggest an idea or improvement for Disscount
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please search
        [existing issues](https://github.com/OffCrazyFreak/Disscount/issues)
        first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this solve, or what need does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, or anything else that helps explain the idea.
    validations:
      required: false
