name: Bug report
description: Report something that is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search
        [existing issues](https://github.com/OffCrazyFreak/Disscount/issues)
        first to avoid duplicates.

        Only the description is required. Fill in whatever else you can, even a
        one-line report is welcome and we can ask follow-up questions.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where in the app
      description: The page or screen it happens on, or a file path if you know it.
      placeholder: "e.g. disscount.me/products, or the notifications bell"
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem? (optional, but it helps a lot)
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what happened instead? (optional)
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend (web / PWA)
        - Backend (API)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, device, and versions where relevant.
      placeholder: "e.g. Chrome 130 on Android 14, or Node 22 / Java 21 locally"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Screenshots or logs
      description: Attach anything that helps. Screenshots can be pasted straight in.
    validations:
      required: false
