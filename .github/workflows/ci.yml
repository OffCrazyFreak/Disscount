name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate route types
        run: pnpm exec next typegen

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint src

      - name: Format check
        run: pnpm exec prettier --check src

      - name: Format check (docs & root markdown)
        run: pnpm exec prettier --check --ignore-path ../.prettierignore "../README.md" "../AGENTS.md" "../CLAUDE.md" "../docs/**/*.md" "../.github/**/*.md" "../.claude/**/*.md"

      - name: Production build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_URL: http://localhost:3000
          BETTER_AUTH_SECRET: ci-dummy-secret-not-used-at-runtime
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          FACEBOOK_CLIENT_ID: ci-dummy
          FACEBOOK_CLIENT_SECRET: ci-dummy
          RESEND_API_KEY: re_ci_dummy
          EMAIL_FROM: ci@example.com
          CIJENE_API_URL: http://localhost:9999
          CIJENE_API_TOKEN: ci-dummy

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - run: mvn -B verify
