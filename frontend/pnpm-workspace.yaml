allowBuilds:
  # Native binaries these packages cannot work without
  sharp: true
  esbuild: true
  unrs-resolver: true
  # Downloads the CLI used to upload source maps during a release build
  "@sentry/cli": true
  # Postinstall only prints a funding notice
  core-js: false
  "@openapitools/openapi-generator-cli": false

# Browser-compatibility data tables that republish almost daily. Without this they
# never clear pnpm's 24h minimumReleaseAge gate, so every rebased PR stays red.
# The guard stays active for every other package.
minimumReleaseAgeExclude:
  - electron-to-chromium
  - caniuse-lite
  - baseline-browser-mapping

# Force patched versions of vulnerable transitive deps (Dependabot #1-3).
# Range selectors bump only the vulnerable copies; already-safe copies stay put.
overrides:
  "shell-quote@<1.8.5": "^1.8.5"
  "postcss@<8.5.10": "^8.5.10"
  "esbuild@<0.25.0": "^0.25.0"
