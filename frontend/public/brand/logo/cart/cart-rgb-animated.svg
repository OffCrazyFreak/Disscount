<svg xmlns="http://www.w3.org/2000/svg" viewBox="-1 6 68 50.5" fill="none" stroke="#2ec50d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .cart-body { stroke-dasharray: 140; stroke-dashoffset: 140; animation: cart-draw 1.2s ease-out forwards; }
    .cart-eyes { stroke-dasharray: 12; stroke-dashoffset: 12; animation: cart-draw 0.5s ease-out 1.1s forwards; }
    .cart-wheel { transform-box: fill-box; transform-origin: center; transform: scale(0); animation: cart-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .cart-wheel.back { animation-delay: 0.9s; }
    .cart-wheel.front { animation-delay: 1.05s; }
    @keyframes cart-draw { to { stroke-dashoffset: 0; } }
    @keyframes cart-pop { to { transform: scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      .cart-body, .cart-eyes { stroke-dasharray: none; stroke-dashoffset: 0; animation: none; }
      .cart-wheel { transform: scale(1); animation: none; }
    }
  </style>
  <g transform="translate(2.5 0) rotate(-7 23 53.5)">
    <path class="cart-body" d="M4.5 8.5c2.4-.3 4.8-.4 7.2-.2l1 .1 5.8 27.4c.2 1.2 1.3 2 2.5 2h27.3c1.1 0 2.1-.7 2.4-1.8l6.6-20.6c.4-1.3-.6-2.7-2-2.7l-36.5-.85"/>
    <path class="cart-eyes" d="M24.5 22.3c2.5-3.1 5.2-3.2 8-.3M38.5 22.1c2.2-2.8 4.7-2.9 7.2-.4"/>
    <circle class="cart-wheel back" cx="23" cy="49" r="4.5"/>
    <circle class="cart-wheel front" cx="45" cy="49" r="4.5"/>
  </g>
</svg>
